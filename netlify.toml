[build]
  command = "npm run build"
  publish = "dist"
  environment = { NODE_VERSION = "20" }

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  VITE_API_BASE_URL = "https://nexusedu-backend-0bjq.onrender.com"

[[headers]]
  for = "/api/*"
    [headers.values]
    Cache-Control = "no-cache"
